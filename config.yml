          title: Bertille Daran
          subtitle: "I am a PhD candidate in environmental economics at [Paris-Saclay Applied Economics (PSAE)](https://eng-psae.versailles-saclay.hub.inrae.fr/) and [CIRED](https://www.centre-cired.fr/en/), under the supervision of [Basak Bayramoglu](https://sites.google.com/site/basakbayramoglu/home) and [Laurent Lamy](https://sites.google.com/site/laurentlamy78/vitae). My research links what I call climate diplomacy (climate negotiations, cooperation, and finance) to land use, and in particular, agriculture, livestock, and forest conservation. I am working with different quantitative and qualitative methodologies: spatial and quantitative trade model, game-theory framework, causal econometric evaluation, and survey and textual analysis."
