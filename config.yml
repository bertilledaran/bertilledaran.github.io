    title: Bertille Daran
    subtitle: "PhD candidate in environmental economics at [Paris-Saclay Applied Economics (PSAE)](https://eng-psae.versailles-saclay.hub.inrae.fr/) and [CIRED](https://www.centre-cired.fr/en/), under the supervision of [Basak Bayramoglu](https://sites.google.com/site/basakbayramoglu/home) and [Laurent Lamy](https://sites.google.com/site/laurentlamy78/vitae). My research links international climate negotiations to land and land use, with a particular focus on agriculture, livestock, and forests."
